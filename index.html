<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGN: Sentinel Field Vetting Terminal</title>
    
    <!-- PWA Capabilities -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sentinel Scanner">
    <meta name="theme-color" content="#1a237e">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --vgn-blue: #1a237e; --vgn-green: #1b5e20; --vgn-gold: #d35400; }
        body { font-family: sans-serif; background: #0f111a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        header { margin-bottom: 25px; border-bottom: 2px solid #1e2235; padding-bottom: 15px; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #2b304a; background: #000; }
        .panel { display: none; padding: 25px; border-radius: 15px; margin-top: 20px; text-align: center; box-sizing: border-box; }
        .granted { background: #1b5e20; border: 4px solid #4caf50; box-shadow: 0 0 20px rgba(76,175,80,0.4); }
        .denied { background: #b71c1c; border: 4px solid #f44336; box-shadow: 0 0 20px rgba(244,67,54,0.4); }
        .btn-reset { background: white; color: black; padding: 14px 28px; border-radius: 8px; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; font-size: 1rem; width: 100%; }
        .btn-action { background: var(--vgn-blue); color: white; border: none; padding: 14px 24px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; letter-spacing: 0.5px; margin-bottom: 10px; }
        .btn-kill { background: #b71c1c; color: white; border: none; padding: 12px 24px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 0.95rem; margin-top: 15px; display: none; }
        .status-msg { font-size: 1.3rem; font-weight: bold; margin: 0 0 10px 0; text-transform: uppercase; }
        .details-msg { font-size: 1.1rem; line-height: 1.5; white-space: pre-line; margin: 0; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h2 style="color: #448aff; margin: 0 0 5px 0; letter-spacing: 1px;">🛡️ SENTINEL SCAN DESK</h2>
            <p style="color: #6c7293; margin: 0; font-size: 0.85rem; font-weight: bold;">FIELD VETTING OPERATION ONLY</p>
        </header>

        <div id="controls">
            <button class="btn-action" onclick="engageCamera()">INITIALIZE TERMINAL CAMERA</button>
        </div>

        <div id="reader"></div>
        
        <!-- Manual Kill Switch Button Element -->
        <button id="kill-button" class="btn-kill" onclick="disengageCameraManual()">🛑 DISENGAGE SCANNER FEED</button>

        <div id="result-panel" class="panel">
            <div class="status-msg" id="status-title"></div>
            <p class="details-msg" id="visitor-details"></p>
            <p id="timestamp" style="font-size: 0.75rem; color: #a1a5b7; margin: 15px 0 0 0; text-align: right;"></p>
            <button class="btn-reset" onclick="resetScanner()">CLEAR & SCAN NEXT</button>
        </div>
    </div>

    <audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        // REPLACE WITH USER SPECIFIC REPO ROUTE IF STATUS.JSON ACTIVATED
        const REMOTE_CONFIG_URL = "https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/YOUR_REPO/main/status.json";
        const html5Qrcode = new Html5Qrcode("reader");
        let scanningState = false;

        async function pullRemoteStatus() {
            try {
                const res = await fetch(`${REMOTE_CONFIG_URL}?t=${Date.now()}`);
                if (res.ok) {
                    const onlineRules = await res.json();
                    localStorage.setItem('vgn_shared_rules', JSON.stringify(onlineRules));
                }
            } catch (e) { console.log("Using cached registry fallback parameters."); }
        }

        function engageCamera() {
            if (scanningState) return;
            document.getElementById('reader').style.display = 'block';
            document.getElementById('result-panel').style.display = 'none';
            document.getElementById('controls').style.display = 'none';

            Html5Qrcode.getCameras().then(cameras => {
                if (cameras.length > 0) {
                    scanningState = true;
                    document.getElementById('kill-button').style.display = 'block'; // Show manual kill switch
                    const selectedCam = cameras.length > 1 ? cameras[1].id : cameras[0].id;
                    html5Qrcode.start(selectedCam, { fps: 15, qrbox: 260 }, processingPipeline);
                } else {
                    alert("Operational Failure: Imaging hardware missing.");
                    document.getElementById('controls').style.display = 'block';
                }
            }).catch(err => {
                console.error(err);
                document.getElementById('controls').style.display = 'block';
            });
        }

        // Manual Kill Button Action Handler
        function disengageCameraManual() {
            if (!scanningState) return;
            scanningState = false;
            html5Qrcode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('kill-button').style.display = 'none';
                document.getElementById('controls').style.display = 'block';
            }).catch(err => console.error("Error stopping camera feed:", err));
        }

        function processingPipeline(decodedText) {
            scanningState = false;
            document.getElementById('kill-button').style.display = 'none'; // Hide kill switch during outcome view
            
            html5Qrcode.stop().then(() => {
                let passObject = null;
                
                // 1. Permissive Ingestion Engine
                try {
                    const parsed = JSON.parse(decodedText);
                    passObject = {
                        id: (parsed.id || parsed.serial || parsed.passId || "").toString().trim(),
                        owner: (parsed.owner || parsed.holder || parsed.name || "Card Bearer").trim(),
                        type: (parsed.type || parsed.category || "legacy").toLowerCase().trim()
                    };
                } catch (e) {
                    // Handshake fallback for plain text codes (e.g. "VGN-1002" or "G-202")
                    passObject = { 
                        id: decodedText.trim(), 
                        owner: "Card Bearer", 
                        type: "legacy"
                    };
                }

                // If parsing resulted in an empty string ID, completely block processing
                if (!passObject.id) {
                    evaluateVerdict("UNREADABLE DATA", "Origin: Unknown Form Structure\nReason: The parser could not locate an identity reference code.", "denied");
                    return;
                }

                // 2. Remote Access Control Rule Parsing Lookup
                const remoteRules = JSON.parse(localStorage.getItem('vgn_shared_rules') || '{}');
                
                if (remoteRules.blacklist && remoteRules.blacklist.includes(passObject.id)) {
                    evaluateVerdict("GLOBAL SECURITY BLOCK", `Serial Ref: ${passObject.id}\nStatus: BLACKLISTED\nAction: Deny Entry.`, "denied");
                    return;
                }

                if (remoteRules.apps && remoteRules.apps[passObject.type] === "disabled") {
                    evaluateVerdict("LAYOUT DEACTIVATED", `Type Detected: ${passObject.type.toUpperCase()}\nStatus: Disabled by Command Center.`, "denied");
                    return;
                }

                // 3. Main Data Layer Authentication Lookup
                const database = JSON.parse(localStorage.getItem('vgn_master_registry') || '{}');
                const matchedRecord = database[passObject.id];

                if (matchedRecord) {
                    if (matchedRecord.status === 'REVOKED') {
                        evaluateVerdict("REVOKED CREDENTIAL", `Serial Ref: ${passObject.id}\nHolder: ${matchedRecord.holder}\nStatus: SUSPENDED BY HQ.`, "denied");
                        logActivity(passObject.id, matchedRecord.holder, "Access Denied (Revoked Pass)");
                    } else {
                        const displayDetails = `Serial Ref: ${passObject.id}\nHolder: ${matchedRecord.holder}\nParameters: ${matchedRecord.vehicle || 'None Assigned'}\nCategory: ${passObject.type.toUpperCase()}`;
                        evaluateVerdict("ACCESS GRANTED", displayDetails, "granted");
                        logActivity(passObject.id, matchedRecord.holder, `Access Allowed (${passObject.type.toUpperCase()})`);
                    }
                } else {
                    // Fallback Allow: If the QR payload structures exist but local DB lookup fails, show unverified warning instead of hard crash
                    evaluateVerdict("UNREGISTERED PASS", `Serial Ref: ${passObject.id}\nHolder: ${passObject.owner}\nStatus: Identity profile missing from this terminal's registry database.`, "denied");
                    logActivity(passObject.id, passObject.owner, "Access Denied (Unregistered Pass)");
                }
            });
        }

        function evaluateVerdict(title, description, visualClass) {
            if (visualClass === "granted") {
                const sound = document.getElementById('successSound');
                if(sound) sound.play().catch(()=>{});
            }
            document.getElementById('reader').style.display = 'none';
            const panel = document.getElementById('result-panel');
            panel.style.display = 'block';
            panel.className = `panel ${visualClass}`;
            
            document.getElementById('status-title').innerText = visualClass === 'granted' ? `✅ ${title}` : `❌ ${title}`;
            document.getElementById('visitor-details').innerText = description;
            document.getElementById('timestamp').innerText = `Processed: ${new Date().toLocaleTimeString()}`;
        }

        function logActivity(id, holder, actionResult) {
            const logs = JSON.parse(localStorage.getItem('vgn_terminal_logs') || '[]');
            logs.unshift({ id, holder, action: actionResult, timestamp: new Date().toLocaleString() });
            localStorage.setItem('vgn_terminal_logs', JSON.stringify(logs));
        }

        function resetScanner() {
            engageCamera();
        }

        document.addEventListener('DOMContentLoaded', () => {
            pullRemoteStatus();
            engageCamera();
        });
    </script>
</body>
</html>
