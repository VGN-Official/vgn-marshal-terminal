<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGN: Sentinel Field Vetting Terminal</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sentinel Scanner">
    <meta name="theme-color" content="#1a237e">

    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/jpeg" href="logo.png">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --vgn-blue: #1a237e; --vgn-green: #1b5e20; }
        body { font-family: sans-serif; background: #0f111a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        header { margin-bottom: 25px; border-bottom: 2px solid #1e2235; padding-bottom: 15px; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #2b304a; background: #000; }
        .panel { display: none; padding: 25px; border-radius: 15px; margin-top: 20px; text-align: center; box-sizing: border-box; }
        .granted { background: #1b5e20; border: 4px solid #4caf50; box-shadow: 0 0 20px rgba(76,175,80,0.4); }
        .denied { background: #b71c1c; border: 4px solid #f44336; box-shadow: 0 0 20px rgba(244,67,54,0.4); }
        .btn-reset { background: white; color: black; padding: 14px 28px; border-radius: 8px; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; font-size: 1rem; width: 100%; }
        .btn-action { background: var(--vgn-blue); color: white; border: none; padding: 14px 24px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; letter-spacing: 0.5px; margin-bottom: 10px; }
        .btn-kill { background: #b71c1c; color: white; border: none; padding: 12px 24px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 0.95rem; margin-top: 15px; display: none; }
        .status-msg { font-size: 1.3rem; font-weight: bold; margin: 0 0 10px 0; text-transform: uppercase; }
        .details-msg { font-size: 1.1rem; line-height: 1.5; white-space: pre-line; margin: 0; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
    </style>

  <script>
    let deferredPrompt;

   window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    // Function to render button into UI
    const mountButton = () => {
        if (document.getElementById('scanner-install-btn')) return;

        const navContainer = document.querySelector('.terminal-nav') || document.body;
        const installBtn = document.createElement('button');
        installBtn.id = 'scanner-install-btn';
        installBtn.className = 'nav-btn';
        installBtn.style.background = 'var(--vgn-gold, #ffb300)';
        installBtn.style.color = '#000';
        installBtn.style.fontWeight = 'bold';
        installBtn.innerText = '🖥️ INSTALL SCANNER TO DESKTOP';

        navContainer.prepend(installBtn);

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`Scanner Install Outcome: ${outcome}`);
                deferredPrompt = null;
                installBtn.remove();
            }
        });
    };

    // If DOM is already loaded, mount immediately; otherwise wait for load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', mountButton);
    } else {
        mountButton();
    }
});
</script>

</head>
<body>
    <div class="container">
        <header>
        
            
            <h2 style="color: #448aff; margin: 0 0 5px 0; letter-spacing: 1px;">🛡️ SENTINEL SCAN DESK</h2>
            <p style="color: #6c7293; margin: 0; font-size: 0.85rem; font-weight: bold;">FIELD VETTING OPERATION ONLY</p>
        
        </header>

        <div id="controls">
            <button class="btn-action" onclick="engageCamera()">INITIALIZE TERMINAL CAMERA</button>
        </div>

        <div id="reader"></div>
        <button id="kill-button" class="btn-kill" onclick="disengageCameraManual()">🛑 DISENGAGE SCANNER FEED</button>

        <div id="result-panel" class="panel">
            <div class="status-msg" id="status-title"></div>
            <p class="details-msg" id="visitor-details"></p>
            <p id="timestamp" style="font-size: 0.75rem; color: #a1a5b7; margin: 15px 0 0 0; text-align: right;"></p>
            <button class="btn-reset" onclick="resetScanner()">CLEAR & SCAN NEXT</button>
        </div>
    </div>

    <audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        const html5Qrcode = new Html5Qrcode("reader");
        let scanningState = false;

        function engageCamera() {
            if (scanningState) return;
            document.getElementById('reader').style.display = 'block';
            document.getElementById('result-panel').style.display = 'none';
            document.getElementById('controls').style.display = 'none';

            Html5Qrcode.getCameras().then(cameras => {
                if (cameras.length > 0) {
                    scanningState = true;
                    document.getElementById('kill-button').style.display = 'block';
                    const selectedCam = cameras.length > 1 ? cameras[1].id : cameras[0].id;
                    
                    // 🚀 REMOVED QRBOX CONSTRAINT - Allows full wide-angle view processing for fast capture
                    html5Qrcode.start(
                        selectedCam, 
                        { fps: 20 }, 
                        processingPipeline
                    );
                } else {
                    alert("Imaging hardware missing.");
                    document.getElementById('controls').style.display = 'block';
                }
            }).catch(err => {
                console.error(err);
                document.getElementById('controls').style.display = 'block';
            });
        }

        function disengageCameraManual() {
            if (!scanningState) return;
            scanningState = false;
            html5Qrcode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('kill-button').style.display = 'none';
                document.getElementById('controls').style.display = 'block';
            });
        }

    function processingPipeline(decodedText) {
    scanningState = false;
    document.getElementById('kill-button').style.display = 'none';
    
    html5Qrcode.stop().then(() => {
        let passObject = null;
        
        // 1. Parse scanned payload
        try {
            const parsed = JSON.parse(decodedText);
            passObject = {
                id: (parsed.id || parsed.serial || parsed.passId || "").toString().trim(),
                owner: (parsed.owner || parsed.holder || parsed.name || "Card Bearer").trim(),
                type: (parsed.type || parsed.category || "General").trim()
            };
        } catch (e) {
            passObject = { 
                id: decodedText.trim(), 
                owner: "Card Bearer", 
                type: "General"
            };
        }

        // Clean fallback if empty string scanned
        if (!passObject.id) {
            passObject.id = "TOKEN-" + Math.floor(1000 + Math.random() * 9000);
        }

        // 2. Fetch local storage registry
        const database = JSON.parse(localStorage.getItem('vgn_master_registry') || '{}');
        const matchedRecord = database[passObject.id];

        // 3. EVALUATE ACCESS

        // Check if explicitly marked as REVOKED/EXPIRED in local database
        if (matchedRecord && matchedRecord.status === "REVOKED") {
            const displayDetails = `Serial Ref: ${passObject.id}\nHolder: ${matchedRecord.holder}\nStatus: REVOKED`;
            evaluateVerdict("ACCESS DENIED (REVOKED)", displayDetails, "denied");
            logActivity(passObject.id, matchedRecord.holder, "Denied - Revoked Pass");

        } else {
            // 🚀 OPEN-ENDED MODE: Accepts ANY serial, digit, or pass format automatically!
            if (!database[passObject.id]) {
                database[passObject.id] = {
                    holder: passObject.owner !== "Card Bearer" ? passObject.owner : "VGN Operational Bearer",
                    vehicle: "Operational Clearance Fleet",
                    status: "ACTIVE"
                };
                localStorage.setItem('vgn_master_registry', JSON.stringify(database));
            }

            const activeRecord = database[passObject.id];
            const displayDetails = `Serial Ref: ${passObject.id}\nHolder: ${activeRecord.holder}\nCategory: ${passObject.type.toUpperCase()}`;
            
            evaluateVerdict("ACCESS GRANTED", displayDetails, "granted");
            logActivity(passObject.id, activeRecord.holder, "Access Allowed");
        }
    });
}

        function evaluateVerdict(title, description, visualClass) {
            if (visualClass === "granted") {
                const sound = document.getElementById('successSound');
                if(sound) sound.play().catch(()=>{});
            }
            document.getElementById('reader').style.display = 'none';
            const panel = document.getElementById('result-panel');
            panel.style.display = 'block';
            panel.className = `panel ${visualClass}`;
            
            document.getElementById('status-title').innerText = `✅ ${title}`;
            document.getElementById('visitor-details').innerText = description;
            document.getElementById('timestamp').innerText = `Processed: ${new Date().toLocaleTimeString()}`;
        }

        function logActivity(id, holder, actionResult) {
            const logs = JSON.parse(localStorage.getItem('vgn_terminal_logs') || '[]');
            logs.unshift({ id, holder, action: actionResult, timestamp: new Date().toLocaleString() });
            localStorage.setItem('vgn_terminal_logs', JSON.stringify(logs));
        }

        function resetScanner() {
            engageCamera();
        }

        document.addEventListener('DOMContentLoaded', () => {
            engageCamera();
        });

        // Register the Service Worker for PWA Installation support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Sentinel Terminal Service Worker Registered Context!', reg.scope))
                    .catch(err => console.error('Service Worker Registration Failed:', err));
            });
        }

    </script>
</body>
</html>
